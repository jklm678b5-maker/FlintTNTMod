name: Build Mod

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Download Forge and Minecraft
      run: |
        mkdir -p libs
        wget -O libs/forge.jar https://maven.minecraftforge.net/net/minecraftforge/forge/1.8.9-11.15.1.2318-1.8.9/forge-1.8.9-11.15.1.2318-1.8.9-universal.jar
        wget -O libs/minecraft.jar https://maven.minecraftforge.net/net/minecraft/server/1.8.9/minecraft-1.8.9-server.jar
    
    - name: Compile Mod with all dependencies
      run: |
        mkdir -p build/classes
        javac -cp "libs/*" -d build/classes src/main/java/com/example/flintnohitbox/*.java
    
    - name: Create JAR
      run: |
        mkdir -p build/libs
        cd build/classes
        jar cf ../libs/FlintTNTMod-1.0.jar com/example/flintnohitbox/*.class
        cd ../..
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: flinttntmod-jar
        path: build/libs/*.jar
